<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="id_formulario">
         <fieldset>
            <legend>
                Calculo - IMC
            </legend>

            <label for="id_nome"> Nome:
                <input type="text"
                placeholder="Nome"
                minlength="5"
                maxlength="200"
                required
                autofocus
                autocomplete="off"
                id="id_nome"
                class="campo_form"
                name="nome"
                >
            </label>
            <br>

            <label for="id_idade"> Idade:
                <input type="number"
                placeholder="Informe sua idade:"
                minlength="1"
                maxlength="3"
                required
                autofocus
                autocomplete="off"
                id="id_idade"
                class="campo_form"
                name="idade"
                >
            </label>
            <br>

            <label for="id_altura"> Altura:
                <input type="text"
                placeholder="Altura (ex: 1,75)"
                minlength="1"
                maxlength="4"
                required
                autofocus
                autocomplete="off"
                id="id_altura"
                class="campo_form"
                name="altura"
                >
            </label>
            <br>

            <label for="id_nome"> Peso:
                <input type="text"
                placeholder="Peso (ex: 70)"
                minlength="1"
                maxlength="4"
                required
                autofocus
                autocomplete="off"
                id="id_peso"
                class="campo_form"
                name="peso"
                >
            </label>
            <br>

            <div class="botao">
                <button type="submit">Enviar</button>
                <button type="reset" class="botao2">Limpar</button>
            </div>

            <div id="id_resultado"></div>
    </form> 
    <script src="script.js"></script>
</body>
</html>
